name: Release
run-name: "Release v${{ inputs.version }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0) — without the 'v' prefix"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Tag & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          VERSION="${{ inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version format '$VERSION'. Expected: X.Y.Z (without v prefix)"
            exit 1
          fi
          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate module builds
        run: go vet ./...

      - name: Run tests
        run: go test -race ./...

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $VERSION"
          git push origin "$TAG"

      - name: Create GitHub Release
        run: |
          PREV_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | grep -B1 "^${TAG}$" | head -1)
          if [ "$PREV_TAG" = "$TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          NOTES=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${TAG}")
          COMPARE="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          gh release create "$TAG" \
            --title "Release $VERSION" \
            --notes "$(printf '## Changes\n\n%s\n\n**Full Changelog**: %s' "$NOTES" "$COMPARE")" \
            --latest
        env:
          GH_TOKEN: ${{ github.token }}
